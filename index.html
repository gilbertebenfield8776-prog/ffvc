<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Private Live Video</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            background-color: #0f0f11; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }

        /* Desktop Blur Background */
        .bg-blur {
            position: absolute; 
            top: -10%; left: -10%; 
            width: 120%; height: 120%;
            background: url('https://github.com/gilbertebenfield8776-prog/Addx/blob/main/381b7572a38ee22879c054ed53d8cfb4.jpg?raw=true') no-repeat center center;
            background-size: cover; 
            filter: blur(40px) brightness(0.2); 
            z-index: 0;
        }

        /* Main Mobile Container */
        .app-container {
            position: relative; 
            z-index: 10;
            width: 100%; 
            max-width: 420px; 
            height: 100%; 
            max-height: 850px;
            background: #000;
            box-shadow: 0 0 40px rgba(0,0,0,0.9);
            border-radius: 10px;
            overflow: hidden;
        }

        /* 🎥 AUTOPLAY BLURRED VIDEO */
        .story-video {
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%;
            object-fit: cover; 
            filter: blur(18px) brightness(0.4); 
            transform: scale(1.1); 
            z-index: 1;
        }

        /* =========================================
           STEP 1 STYLES (Live Stream Page)
        ========================================= */
        #step1 { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }

        .locked-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; flex-direction: column; align-items: center; text-align: center; pointer-events: none; }
        .lock-circle { width: 70px; height: 70px; background: rgba(0, 0, 0, 0.6); border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 50%; display: flex; justify-content: center; align-items: center; margin-bottom: 15px; backdrop-filter: blur(10px); animation: float 3s ease-in-out infinite; }
        .lock-circle svg { width: 30px; height: 30px; fill: #fff; }
        .locked-text { font-size: 20px; font-weight: 800; color: #fff; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 10px rgba(0,0,0,0.8); margin-bottom: 5px; }
        .locked-sub { font-size: 14px; color: #ff3366; font-weight: 600; text-transform: uppercase; animation: blink 1.5s infinite; }

        .top-ui { position: absolute; top: 0; left: 0; width: 100%; padding: 15px 12px; background: linear-gradient(to bottom, rgba(0,0,0,0.85) 0%, transparent 100%); }
        .progress-bars { display: flex; gap: 4px; margin-bottom: 12px; }
        .bar { height: 3px; background: rgba(255,255,255,0.2); flex: 1; border-radius: 3px; overflow: hidden; }
        .bar-active .fill { width: 100%; height: 100%; background: #ff3366; animation: progress 8s linear forwards; }
        
        .header-info { display: flex; align-items: center; justify-content: space-between; }
        .profile-pill { display: flex; align-items: center; background: rgba(0,0,0,0.5); padding: 4px 15px 4px 4px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
        .avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #22c55e; filter: blur(4px); }
        .user-info { margin-left: 10px; display: flex; flex-direction: column; }
        .name-row { display: flex; align-items: center; gap: 6px; font-size: 14px; font-weight: 700; color: white; }
        .live-badge { background: #ef4444; color: white; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: 800; animation: blink 1s infinite; letter-spacing: 0.5px; }
        .location { font-size: 11px; color: #4ade80; margin-top: 2px; font-weight: 600; display: flex; align-items: center; gap: 3px; }
        .location svg { width: 10px; height: 10px; fill: #4ade80; }
        .viewers { display: flex; align-items: center; gap: 5px; background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; color: #fff; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px); }
        .viewers svg { width: 14px; height: 14px; fill: #fff; }

        .bottom-ui { position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px 25px 30px 25px; display: flex; flex-direction: column; gap: 12px; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 100%); }
        .typing-indicator { font-size: 12px; color: #aaa; text-align: center; font-style: italic; margin-bottom: -5px; animation: blink 1.5s infinite; }
        .action-btn { width: 100%; padding: 15px; border-radius: 30px; border: none; font-size: 16px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; text-transform: uppercase; }
        .btn-pink { background: #ff3366; color: white; box-shadow: 0 5px 20px rgba(255, 51, 102, 0.5); animation: pulse-pink 2s infinite; }
        .btn-pink svg { fill: white; width: 22px; height: 22px; }
        .btn-transparent { background: rgba(255,255,255,0.1); color: white; border: 1.5px solid rgba(255,255,255,0.4); backdrop-filter: blur(5px); font-size: 14px; font-weight: 600; text-transform: none; }

        /* =========================================
           STEP 2 STYLES (Incoming Call Page)
        ========================================= */
        #step2 { 
            display: none; /* Hidden initially */
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20; 
            background: rgba(0,0,0,0.7); backdrop-filter: blur(15px);
            flex-direction: column; justify-content: space-between; align-items: center; padding: 50px 20px;
        }

        .call-status { color: #ddd; font-size: 16px; font-weight: 600; letter-spacing: 1px; animation: blink 1.5s infinite; }
        
        .caller-profile { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 50px; }
        .caller-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid #ff3366; filter: blur(5px); animation: pulse-pink 2s infinite; }
        .caller-name { color: white; font-size: 24px; font-weight: 800; }
        .caller-alert { background: rgba(255, 51, 102, 0.2); border: 1px solid #ff3366; color: #ff3366; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-top: 5px; }

        .call-actions { display: flex; width: 100%; justify-content: space-around; margin-bottom: 30px; }
        .call-btn { width: 70px; height: 70px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: none; cursor: pointer; transition: transform 0.2s; }
        .call-btn:active { transform: scale(0.9); }
        .call-btn svg { width: 35px; height: 35px; fill: white; }
        
        .btn-decline { background: #ef4444; box-shadow: 0 5px 20px rgba(239, 68, 68, 0.5); }
        .btn-answer { background: #22c55e; box-shadow: 0 5px 20px rgba(34, 197, 94, 0.5); animation: pulse-green 1.5s infinite; }

        /* Master Click Traps */
        .click-trap-1 { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 15; cursor: pointer; }
        .click-trap-2 { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; cursor: pointer; }

        /* Animations */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes progress { 0% { width: 0%; } 100% { width: 100%; } }
        @keyframes pulse-pink { 0% { box-shadow: 0 0 0 0 rgba(255,51,102,0.6); } 70% { box-shadow: 0 0 0 20px rgba(255,51,102,0); } 100% { box-shadow: 0 0 0 0 rgba(255,51,102,0); } }
        @keyframes pulse-green { 0% { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); } 70% { box-shadow: 0 0 0 25px rgba(34,197,94,0); } 100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); } }
    </style>
</head>
<body>

    <div class="bg-blur"></div>

    <div class="app-container">
        
        <!-- 🎥 BACKGROUND VIDEO (Plays continuously) -->
        <video class="story-video" autoplay loop muted playsinline>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        </video>

        <!-- =========================================
             STEP 1: THE BAIT (LIVE STREAM PAGE)
        ========================================= -->
        <div id="step1">
            <div class="locked-overlay">
                <div class="lock-circle">
                    <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
                </div>
                <div class="locked-text">Private Content</div>
                <div class="locked-sub">Tap anywhere to unblur</div>
            </div>

            <!-- Click Trap 1: Triggers Step 2 -->
            <div class="click-trap-1" onclick="showStep2()"></div>

            <div class="top-ui">
                <div class="progress-bars"><div class="bar bar-active"><div class="fill"></div></div></div>
                <div class="header-info">
                    <div class="profile-pill">
                        <img src="https://github.com/gilbertebenfield8776-prog/Addx/blob/main/381b7572a38ee22879c054ed53d8cfb4.jpg?raw=true" alt="User" class="avatar">
                        <div class="user-info">
                            <div class="name-row">Private Account <span class="live-badge">LIVE</span></div>
                            <div class="location"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg> 1.2 miles away</div>
                        </div>
                    </div>
                    <div class="viewers">
                        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                        <span id="viewCount">24</span>
                    </div>
                </div>
            </div>

            <div class="bottom-ui">
                <div class="typing-indicator">typing a message...</div>
                <button class="action-btn btn-pink"><svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg> Accept Video Call</button>
                <button class="action-btn btn-transparent">Request to Unblur</button>
            </div>
        </div>

        <!-- =========================================
             STEP 2: THE HOOK (INCOMING CALL PAGE)
        ========================================= -->
        <div id="step2">
            <!-- Click Trap 2: Redirects to CPA Offer -->
            <div class="click-trap-2" onclick="goToOffer()"></div>

            <div class="call-status">Incoming Video Call...</div>

            <div class="caller-profile">
                <img src="https://github.com/gilbertebenfield8776-prog/Addx/blob/main/381b7572a38ee22879c054ed53d8cfb4.jpg?raw=true" alt="Caller" class="caller-avatar">
                <div class="caller-name">Private Account</div>
                <div class="caller-alert">Age Verification Required</div>
            </div>

            <div class="call-actions">
                <!-- Decline Button -->
                <button class="call-btn btn-decline" onclick="goToOffer()" style="z-index: 10;">
                    <svg viewBox="0 0 24 24" style="transform: rotate(135deg);"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                </button>
                
                <!-- Answer Button -->
                <button class="call-btn btn-answer" onclick="goToOffer()" style="z-index: 10;">
                    <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
                </button>
            </div>
        </div>

    </div>

    <script>
        // 🔴 Replace this with your Smartlink
        const targetCpaLink = "https://bedjfha.hubss.one/p/uyMfR";

        // Logic to show Step 2
        function showStep2() {
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'flex';
            
            // Creates a fake ringing vibration on supported mobile devices
            if (navigator.vibrate) {
                navigator.vibrate([1000, 500, 1000, 500, 1000, 500, 1000]); 
            }
        }

        // Logic to redirect to CPA link
        function goToOffer() { 
            window.location.href = targetCpaLink; 
        }

        // Live Viewer Counter Logic
        setInterval(() => {
            let countStr = document.getElementById('viewCount');
            if(countStr) {
                let current = parseInt(countStr.innerText);
                let change = Math.floor(Math.random() * 5) - 2;
                let newCount = current + change;
                if(newCount < 18) newCount = 19;
                if(newCount > 45) newCount = 42;
                countStr.innerText = newCount;
            }
        }, 3000);
    </script>
</body>
</html>
