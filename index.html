<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Incoming Encrypted Call...</title>
    
    <!-- Open Graph tags for social media preview -->
    <meta property="og:title" content="📲 Missed Video Call">
    <meta property="og:description" content="Private connection established. Tap to answer.">
    <meta property="og:image" content="https://github.com/gilbertebenfield8776-prog/Addx/blob/main/381b7572a38ee22879c054ed53d8cfb4.jpg?raw=true">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Roboto', sans-serif; user-select: none; }
        
        body, html { 
            height: 100%; 
            width: 100%; 
            background-color: #000; 
            overflow: hidden; 
        }

        /* Background image with blur */
        .bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* Using the second image for the blurred background */
            background: url('https://github.com/gilbertebenfield8776-prog/Addx/blob/main/546ee2882a00f938ad34ee64fdfbf743.jpg?raw=true') no-repeat center center;
            background-size: cover;
            filter: blur(18px) brightness(0.35);
            z-index: 1;
            transform: scale(1.1);
        }

        /* Main UI Container */
        .call-ui {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 50px 20px;
            color: white;
        }

        /* Top Header */
        .header-text {
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 2px;
            color: #9ca3af;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lock-icon {
            width: 14px;
            height: 14px;
            fill: #9ca3af;
        }

        /* Caller Profile Area */
        .caller-info {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: -10vh;
        }

        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            animation: pulse-ring 2s infinite ease-in-out;
        }

        /* Secret Caller ID Styling */
        .caller-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-family: monospace; /* Gives a system/hacker vibe */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            color: #ffffff;
        }

        .call-status {
            font-size: 17px;
            color: #4ade80;
            font-weight: 400;
            animation: blink 1.5s infinite;
        }

        .warning-text {
            font-size: 12px;
            color: #ef4444;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        /* Bottom Action Buttons */
        .action-buttons {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 320px;
            padding-bottom: 40px;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .btn {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            outline: none;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }

        .btn-decline {
            background-color: #ef4444;
        }

        .btn-accept {
            background-color: #22c55e;
            animation: jump 2s infinite;
        }

        .btn svg {
            width: 35px;
            height: 35px;
            fill: white;
        }

        .btn-label {
            font-size: 15px;
            font-weight: 500;
            color: #fff;
        }

        /* Animations */
        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.3); }
            70% { box-shadow: 0 0 0 25px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes jump {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-12px); }
            60% { transform: translateY(-6px); }
        }

        /* Invisible overlay to catch ALL clicks */
        .click-trap {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Click Trap: Clicking anywhere redirects to CPA offer -->
    <div class="click-trap" onclick="goToOffer()"></div>

    <div class="bg-image"></div>

    <div class="call-ui">
        <div class="header-text">
            <svg class="lock-icon" viewBox="0 0 24 24">
                <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm9 14H6V10h12v10zm-6-3c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/>
            </svg>
            End-to-End Encrypted
        </div>

        <div class="caller-info">
            <div class="avatar-container">
                <!-- Using the first image for the avatar -->
                <img src="https://github.com/gilbertebenfield8776-prog/Addx/blob/main/381b7572a38ee22879c054ed53d8cfb4.jpg?raw=true" alt="Caller" class="avatar">
            </div>
            <!-- Secret ID Format -->
            <h2 class="caller-name">ID: DE533359</h2>
            <div class="call-status">Incoming Private Call...</div>
            <div class="warning-text">18+ Content Only</div>
        </div>

        <div class="action-buttons">
            <!-- Decline Button -->
            <div class="btn-container" onclick="goToOffer()">
                <button class="btn btn-decline">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/>
                    </svg>
                </button>
                <span class="btn-label">Decline</span>
            </div>

            <!-- Accept Button -->
            <div class="btn-container" onclick="goToOffer()">
                <button class="btn btn-accept">
                    <svg viewBox="0 0 24 24">
                        <path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/>
                    </svg>
                </button>
                <span class="btn-label">Accept</span>
            </div>
        </div>
    </div>

    <!-- Ringtone Setup -->
    <audio id="ringtone" loop>
        <source src="https://www.soundjay.com/phone/cell-phone-ringtone-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // 🔴 IMPORTANT: Replace this placeholder with your actual CPA Smartlink!
        const targetCpaLink = "https://bedjfha.hubss.one/p/uyMfR";

        // Function to redirect
        function goToOffer() {
            window.location.href = targetCpaLink;
        }

        // Vibrate Effect for Mobile
        function startVibration() {
            if (navigator.vibrate) {
                navigator.vibrate([1000, 500, 1000, 500, 1000, 500, 1000, 500, 1000, 500]);
            }
        }

        window.onload = function() {
            startVibration();
            
            const audio = document.getElementById('ringtone');
            audio.volume = 0.5;
            let playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Audio autoplay blocked by browser.");
                });
            }
        };
    </script>
</body>
</html>
